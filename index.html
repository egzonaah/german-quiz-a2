<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deutsch Quiz Master</title>
    <style>
        :root {
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --primary: #6366F1;
            --secondary: #EEF2FF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --success: #10B981;
            --error: #EF4444;
            --accent: #F59E0B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .screen {
            display: none;
            flex-direction: column;
            padding: 24px;
            flex: 1;
            overflow-y: auto;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .screen.active {
            display: flex;
            animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 10px; color: var(--text-main); }
        p.subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 16px; }

        /* --- Setup Screen --- */
        .setup-card {
            background: var(--card);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .input-group { margin: 20px 0; }
        .input-group label { display: block; margin-bottom: 10px; font-weight: 700; color: var(--text-muted); }
        
        select {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid var(--secondary);
            font-size: 18px;
            font-weight: 600;
            background: var(--bg);
            color: var(--text-main);
            outline: none;
        }

        /* --- Quiz UI --- */
        .progress-container { margin-bottom: 20px; }
        .progress-bar { height: 8px; background: var(--secondary); border-radius: 10px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; }
        
        .q-card {
            background: var(--card);
            padding: 35px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            margin-bottom: 25px;
            text-align: center;
        }

        .q-card h2 { font-size: 22px; line-height: 1.5; }

        .options-list { display: flex; flex-direction: column; gap: 12px; }
        
        .opt-btn {
            background: var(--card);
            border: 2px solid var(--secondary);
            padding: 18px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            color: var(--text-main);
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            pointer-events: auto;
        }

        .opt-btn:active {
            background: var(--secondary);
            transform: scale(0.97);
            border-color: var(--primary);
        }

        /* --- Buttons --- */
        .btn-main {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        /* --- Analysis --- */
        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 60px;
            background: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
        }

        .review-card {
            background: white;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 10px;
            border-left: 5px solid;
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <h1>Willkommen</h1>
        <p class="subtitle">Wähle deine Quiz-Optionen</p>
        <div class="setup-card">
            <div class="input-group">
                <label>Wie viele Fragen?</label>
                <select id="q-count-select">
                    <option value="5">5 Fragen</option>
                    <option value="10" selected>10 Fragen</option>
                    <option value="15">15 Fragen</option>
                    <option value="20">20 Fragen</option>
                </select>
            </div>
            <button class="btn-main" onclick="startQuiz()">Starten</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress-container">
            <p id="q-meta" style="text-align:center; font-weight:700; color:var(--text-muted); font-size:12px; margin-bottom:8px; text-transform:uppercase;">Frage 1</p>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>
        <div class="q-card"><h2 id="q-text">Frage lädt...</h2></div>
        <div class="options-list" id="opt-container"></div>
    </div>

    <div id="result-screen" class="screen">
        <h1>Ergebnis</h1>
        <div class="score-circle" id="final-score">0/0</div>
        <p id="performance-analysis" style="text-align:center; font-weight:600; margin-bottom:30px;"></p>
        <button class="btn-main" onclick="showReview()">Review Details</button>
        <button class="btn-main" style="background:var(--secondary); color:var(--primary); box-shadow:none;" onclick="location.reload()">Neues Quiz erstellen</button>
    </div>

    <div id="review-screen" class="screen">
        <h1>Überprüfung</h1>
        <div id="review-list"></div>
        <button class="btn-main" onclick="location.reload()">Fertig</button>
    </div>

    <script>
        const MASTER_POOL = [
            // A1 Questions
            { q: "Wie ___ du?", a: ["bist", "heißt", "hast", "wohnst"], c: "heißt", l: "A1" },
            { q: "Ich ___ aus Deutschland.", a: ["komme", "bin", "wohne", "gehe"], c: "komme", l: "A1" },
            { q: "Das ist ___ Apfel.", a: ["ein", "eine", "einen", "einer"], c: "ein", l: "A1" },
            { q: "Was ___ du von Beruf?", a: ["hast", "bist", "machst", "arbeitest"], c: "bist", l: "A1" },
            { q: "Wir ___ heute keine Zeit.", a: ["haben", "sind", "hat", "hast"], c: "haben", l: "A1" },
            { q: "Wo ___ die Post?", a: ["ist", "liegt", "wohnt", "steht"], c: "ist", l: "A1" },
            { q: "Mein Bruder ___ in Berlin.", a: ["wohnt", "lebt", "wohnen", "ist"], c: "wohnt", l: "A1" },
            { q: "Sprichst du ___ Englisch?", a: ["gut", "viele", "ein bisschen", "groß"], c: "gut", l: "A1" },
            // A2 Questions
            { q: "Ich bin gestern ins Kino ___.", a: ["gegangen", "ging", "gehen", "gehst"], c: "gegangen", l: "A2" },
            { q: "Er ___ das Auto reparieren.", a: ["kann", "kennt", "können", "kannst"], c: "kann", l: "A2" },
            { q: "Ich freue mich ___ den Urlaub.", a: ["auf", "über", "für", "an"], c: "auf", l: "A2" },
            { q: "Das ist das Haus, ___ ich wohne.", a: ["in dem", "wo", "dass", "welches"], c: "in dem", l: "A2" },
            { q: "Wenn es regnet, ___ wir zu Hause.", a: ["bleiben", "blieben", "geblieben", "bleibt"], c: "bleiben", l: "A2" },
            { q: "Ich habe meinen Schlüssel ___.", a: ["verloren", "verlieren", "verliert", "verlorest"], c: "verloren", l: "A2" },
            { q: "Dieses Buch ist ___ als das andere.", a: ["interessanter", "interessant", "am interessantesten", "mehr interessant"], c: "interessanter", l: "A2" },
            { q: "Könnten Sie mir bitte ___?", a: ["helfen", "hilfst", "geholfen", "hilft"], c: "helfen", l: "A2" },
            { q: "Er arbeitet, ___ er Geld braucht.", a: ["weil", "obwohl", "dass", "dann"], c: "weil", l: "A2" },
            { q: "Ich hätte gern ___ Kaffee.", a: ["einen", "ein", "einem", "einer"], c: "einen", l: "A2" },
            { q: "Seit ___ einem Jahr lerne ich Deutsch.", a: ["fast", "für", "vor", "nach"], c: "fast", l: "A2" },
            { q: "Darf ich dich etwas ___?", a: ["fragen", "fragst", "gefragt", "frage"], c: "fragen", l: "A2" }
        ];

        let quizSet = [];
        let currentIdx = 0;
        let logs = [];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startQuiz() {
            const count = parseInt(document.getElementById('q-count-select').value);
            // Shuffle and slice based on user selection
            quizSet = [...MASTER_POOL].sort(() => Math.random() - 0.5).slice(0, count);
            currentIdx = 0;
            logs = [];
            showScreen('quiz-screen');
            renderQuestion();
        }

        function renderQuestion() {
            const data = quizSet[currentIdx];
            document.getElementById('q-meta').innerText = `Level ${data.l} | Frage ${currentIdx + 1} von ${quizSet.length}`;
            document.getElementById('q-text').innerText = data.q;
            
            const progress = (currentIdx / quizSet.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;

            const container = document.getElementById('opt-container');
            container.innerHTML = '';

            data.a.forEach(option => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                b.innerText = option;
                // 'pointerup' is best for mobile to avoid the click delay
                b.addEventListener('pointerup', (e) => {
                    e.preventDefault();
                    handleSelect(option);
                });
                container.appendChild(b);
            });
        }

        function handleSelect(choice) {
            const data = quizSet[currentIdx];
            logs.push({
                q: data.q,
                user: choice,
                correct: data.c,
                isRight: choice === data.c
            });

            if (currentIdx + 1 < quizSet.length) {
                currentIdx++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            const score = logs.filter(l => l.isRight).length;
            const pct = (score / quizSet.length) * 100;
            
            document.getElementById('final-score').innerText = `${score}/${quizSet.length}`;
            
            let analysis = "";
            if(pct === 100) analysis = "Perfekt! Dein Deutsch ist ausgezeichnet.";
            else if(pct >= 80) analysis = "Sehr gut! Du hast fast alles richtig gemacht.";
            else if(pct >= 50) analysis = "Gut gemacht, aber schau dir die Fehler nochmal an.";
            else analysis = "Übung macht den Meister! Probier es gleich nochmal.";

            document.getElementById('performance-analysis').innerText = analysis;
            showScreen('result-screen');
        }

        function showReview() {
            const list = document.getElementById('review-list');
            list.innerHTML = '';
            logs.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'review-card';
                div.style.borderColor = item.isRight ? 'var(--success)' : 'var(--error)';
                div.innerHTML = `
                    <p style="font-weight:700; margin-bottom:5px;">${i+1}. ${item.q}</p>
                    <p style="font-size:14px;">Deine Antwort: <span style="color:${item.isRight ? 'var(--success)' : 'var(--error)'}; font-weight:700;">${item.user}</span></p>
                    ${!item.isRight ? `<p style="font-size:14px;">Richtig: <span style="color:var(--success); font-weight:700;">${item.correct}</span></p>` : ''}
                `;
                list.appendChild(div);
            });
            showScreen('review-screen');
        }
    </script>
</body>
</html>
