<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>German A2 Pro</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #4f46e5;
            --secondary: #6366f1;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.5; }

        /* Container */
        #app { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 80px; }

        /* Navigation */
        nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; display: flex; border-top: 1px solid var(--border); z-index: 100; }
        .nav-btn { flex: 1; padding: 20px; text-align: center; border: none; background: none; font-weight: 600; color: #94a3b8; cursor: pointer; }
        .nav-btn.active { color: var(--primary); border-top: 3px solid var(--primary); }

        /* Views */
        .view { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Components */
        .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid var(--border); }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; text-align: center; color: var(--primary); }
        h2 { font-size: 1.1rem; margin-bottom: 15px; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid var(--border); background: white; font-size: 1rem; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; text-align: left; }
        .btn:active { transform: scale(0.98); background: #f1f5f9; }
        .btn-primary { background: var(--primary); color: white; border: none; text-align: center; margin-top: 10px; }
        .btn-selected { border-color: var(--primary); background: #eef2ff; color: var(--primary); border-width: 2px; }

        input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid var(--border); font-size: 1rem; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--primary); }

        /* Progress */
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }

        /* Analyzer */
        .analyzer-item { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .correct-label { color: var(--success); font-weight: bold; }
        .wrong-label { color: var(--danger); font-weight: bold; }

        /* Flashcards */
        .fc-container { height: 200px; perspective: 1000px; margin-bottom: 20px; }
        .fc-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
        .fc-inner.flipped { transform: rotateY(180deg); }
        .fc-front, .fc-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .fc-front { background: white; border: 2px solid var(--primary); color: var(--primary); }
        .fc-back { background: var(--primary); color: white; transform: rotateY(180deg); }
    </style>
</head>
<body>

<div id="app">
    <div id="view-start" class="view active">
        <h1>Deutsch A2</h1>
        <div class="card">
            <h2>Select Quiz Length</h2>
            <button class="btn qty-btn" onclick="selectQty(10, this)">10 Questions</button>
            <button class="btn qty-btn" onclick="selectQty(20, this)">20 Questions</button>
            <input type="number" id="custom-qty" placeholder="Custom amount...">
            <button class="btn btn-primary" onclick="initQuiz()">Start Practice</button>
        </div>
    </div>

    <div id="view-quiz" class="view">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="quiz-content"></div>
    </div>

    <div id="view-results" class="view">
        <div class="card" style="text-align: center;">
            <h2>Result</h2>
            <div id="final-percent" style="font-size: 3rem; font-weight: 800; color: var(--primary);">0%</div>
            <p id="final-score-text"></p>
            <button class="btn btn-primary" onclick="location.reload()">Restart</button>
        </div>
        <div class="card" id="analyzer-list">
            <h2>Work Analyzer</h2>
            </div>
    </div>

    <div id="view-flash" class="view">
        <div class="fc-container">
            <div class="fc-inner" id="fc-inner" onclick="this.classList.toggle('flipped')">
                <div class="fc-front"><h2 id="fc-front">Wort</h2></div>
                <div class="fc-back"><h2 id="fc-back">Meaning</h2><p id="fc-ex" style="font-size:0.8rem; margin-top:10px;"></p></div>
            </div>
        </div>
        <button class="btn btn-primary" onclick="nextFlashcard()">Next Card</button>
    </div>

    <nav>
        <button class="nav-btn active" onclick="showView('start')">Quiz</button>
        <button class="nav-btn" onclick="showView('flash')">Cards</button>
    </nav>
</div>

<script>
    const questionBank = [
        { type: "mc", q: "Which is the correct past perfect form of: 'Ich gehe ins Kino'?", options: ["Ich bin ins Kino gegangen.", "Ich habe ins Kino gegangen.", "Ich bin ins Kino gegeht."], correct: "Ich bin ins Kino gegangen." },
        { type: "fill", q: "Ich fahre mit ___ (my) Bruder.", correct: "meinem" },
        { type: "mc", q: "Word order: 'Ich bleibe zu Hause, weil...'", options: ["...ich krank bin.", "...ich bin krank.", "...bin ich krank."], correct: "...ich krank bin." },
        { type: "fill", q: "Wir freuen ___ (ourselves) auf den Urlaub.", correct: "uns" },
        { type: "mc", q: "'Ich stelle die Blume auf ___ Tisch.'", options: ["den", "dem", "der"], correct: "den" },
        { type: "write", q: "Translate: 'I would like to pay, please.'", correct: "Ich möchte bitte zahlen." },
        { type: "fill", q: "Past tense 'sein': 'Wir ___ gestern im Park.'", correct: "waren" },
        { type: "write", q: "Translate: 'Which dress do you buy?'", correct: "Welches Kleid kaufst du?" },
        { type: "mc", q: "Possessive: 'Sie liebt ___ Hund.'", options: ["ihren", "ihr", "ihrem"], correct: "ihren" },
        { type: "fill", q: "Der Zug fährt ___ (at) 15 Uhr ab.", correct: "um" }
    ];

    const flashBank = [
        { f: "anrufen", b: "to call (phone)", e: "Ich rufe dich morgen an." },
        { f: "der Bahnsteig", b: "the platform", e: "Der Zug steht an Bahnsteig 4." },
        { f: "weil", b: "because", e: "Ich bleibe hier, weil ich müde bin." }
    ];

    let currentQuiz = [];
    let currentIdx = 0;
    let score = 0;
    let quizQty = 10;
    let resultsLog = [];

    function showView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(viewId.replace('start','quiz'))));
    }

    function selectQty(n, btn) {
        quizQty = n;
        document.querySelectorAll('.qty-btn').forEach(b => b.classList.remove('btn-selected'));
        btn.classList.add('btn-selected');
    }

    function initQuiz() {
        const custom = document.getElementById('custom-qty').value;
        const finalQty = custom ? parseInt(custom) : quizQty;
        currentQuiz = [...questionBank].sort(() => 0.5 - Math.random()).slice(0, finalQty);
        currentIdx = 0;
        score = 0;
        resultsLog = [];
        showView('quiz');
        renderQuestion();
    }

    function renderQuestion() {
        const q = currentQuiz[currentIdx];
        const progress = ((currentIdx / currentQuiz.length) * 100);
        document.getElementById('progress-fill').style.width = progress + "%";

        let html = `<div class="card"><h2>${q.q}</h2>`;
        
        if (q.type === 'mc') {
            q.options.forEach(opt => {
                html += `<button class="btn" onclick="checkAnswer('${opt.replace(/'/g, "\\'")}')">${opt}</button>`;
            });
        } else {
            html += `<input type="text" id="write-input" placeholder="Your answer...">
                     <button class="btn btn-primary" onclick="checkAnswer(document.getElementById('write-input').value)">Submit</button>`;
        }
        
        html += `</div>`;
        document.getElementById('quiz-content').innerHTML = html;
    }

    function checkAnswer(userAns) {
        const q = currentQuiz[currentIdx];
        const isCorrect = userAns.toLowerCase().trim() === q.correct.toLowerCase().trim();
        
        if (isCorrect) score++;
        
        resultsLog.push({ q: q.q, user: userAns, correct: q.correct, status: isCorrect });
        
        currentIdx++;
        if (currentIdx < currentQuiz.length) {
            renderQuestion();
        } else {
            showFinalResults();
        }
    }

    function showFinalResults() {
        showView('results');
        const percent = Math.round((score / currentQuiz.length) * 100);
        document.getElementById('final-percent').innerText = percent + "%";
        document.getElementById('final-score-text').innerText = `Scored ${score} / ${currentQuiz.length}`;

        const list = document.getElementById('analyzer-list');
        list.innerHTML = '<h2>Work Analyzer</h2>';
        resultsLog.forEach(item => {
            list.innerHTML += `
                <div class="analyzer-item">
                    <strong>Q: ${item.q}</strong><br>
                    <span class="${item.status ? 'correct-label' : 'wrong-label'}">
                        Your answer: ${item.user || '(Empty)'}
                    </span><br>
                    ${!item.status ? `<span>Correct: ${item.correct}</span>` : ''}
                </div>`;
        });
    }

    let cardIdx = 0;
    function nextFlashcard() {
        document.getElementById('fc-inner').classList.remove('flipped');
        setTimeout(() => {
            cardIdx = (cardIdx + 1) % flashBank.length;
            document.getElementById('fc-front').innerText = flashBank[cardIdx].f;
            document.getElementById('fc-back').innerText = flashBank[cardIdx].b;
            document.getElementById('fc-ex').innerText = flashBank[cardIdx].e;
        }, 200);
    }
    nextFlashcard(); // Init first card
</script>

</body>
</html>
